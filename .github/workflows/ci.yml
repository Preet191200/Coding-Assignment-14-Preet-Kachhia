name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./portfolio-site
        run: npm install

      - name: Run ESLint
        working-directory: ./portfolio-site
        run: npx eslint src || true

      - name: Build React App
        working-directory: ./portfolio-site
        run: npm run build
